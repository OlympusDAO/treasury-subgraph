name: Security Audit

on:
  pull_request:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Bootstrap
        uses: ./.github/actions/bootstrap

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build server Docker image
        run: pnpm run docker:build:server

      - name: Tag server image for scan
        run: pnpm run docker:tag:scan:server

      - name: Scan server Dockerfile for misconfigurations
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          scan-ref: apps/server/Dockerfile
          scanners: misconfig
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "1"

      - name: Scan server image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: treasury-subgraph/server:scan
          format: table
          severity: MEDIUM,HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: "1"
