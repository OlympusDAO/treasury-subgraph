name: pnpm CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Run build
        run: pnpm run build
        env:
          WG_PUBLIC_NODE_URL: http://localhost:9991

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Run test
        run: pnpm run test:ci
        env:
          ARBITRUM_SUBGRAPH_API_KEY: ${{ secrets.ARBITRUM_SUBGRAPH_API_KEY }}
          WG_PUBLIC_NODE_URL: http://localhost:9991

  lint_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Run lint:check
        run: pnpm run lint:check
