name: Security Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [develop, main]
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Run security audit
        run: |
          yarn audit --level moderate --json > /dev/null 2>&1 || EXIT_CODE=$?
          yarn audit --level moderate
          if [ $EXIT_CODE -ge 4 ]; then
            echo "::error::Moderate or higher severity vulnerabilities found (exit code: $EXIT_CODE)"
            exit 1
          fi

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ':warning: Security audit failed. Please run `yarn audit --level moderate` locally to review vulnerabilities.'
            })
